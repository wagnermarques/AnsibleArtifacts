---
- name: Ensure math and science base directory exists
  file:
    path: "{{ math_science_base_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ tools_owner }}"
  become: yes

- name: Ensure tool directories exist
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ tools_owner }}"
  loop:
    - "{{ geogebra_dir }}"
    - "{{ scilab_dir }}"
    - "{{ paraview_dir }}"
    - "{{ stellarium_dir }}"
    - "{{ zotero_dir }}"
  become: yes

- name: Install GeoGebra (Extraction)
  unarchive:
    src: "{{ geogebra_url }}"
    dest: "{{ geogebra_dir }}"
    remote_src: yes
    creates: "{{ geogebra_dir }}/GeoGebra-linux-x64/GeoGebra"
    owner: "{{ tools_owner }}"
  become: yes

- name: Fix GeoGebra permissions
  file:
    path: "{{ geogebra_dir }}/GeoGebra-linux-x64"
    owner: "{{ tools_owner }}"
    group: "{{ tools_owner }}"
    mode: '0755'
    recurse: yes
  become: yes

- name: Install Scilab (Extraction)
  unarchive:
    src: "{{ scilab_url }}"
    dest: "{{ scilab_dir }}"
    remote_src: yes
    extra_opts: ["--strip-components=1"]
    creates: "{{ scilab_dir }}/bin/scilab"
    owner: "{{ tools_owner }}"
  become: yes

- name: Install ParaView (Extraction)
  unarchive:
    src: "{{ paraview_url }}"
    dest: "{{ paraview_dir }}"
    remote_src: yes
    extra_opts: ["--strip-components=1"]
    creates: "{{ paraview_dir }}/bin/paraview"
    owner: "{{ tools_owner }}"
  become: yes

- name: Install Stellarium (AppImage)
  get_url:
    url: "{{ stellarium_url }}"
    dest: "{{ stellarium_dir }}/stellarium.AppImage"
    mode: '0755'
    owner: "{{ tools_owner }}"
  become: yes

- name: Install Zotero (Extraction)
  unarchive:
    src: "{{ zotero_url }}"
    dest: "{{ zotero_dir }}"
    remote_src: yes
    extra_opts: ["--strip-components=1"]
    creates: "{{ zotero_dir }}/zotero"
    owner: "{{ tools_owner }}"
  become: yes

- name: Create shell integration for Math/Science Tools PATH
  copy:
    dest: "~/.bashrc_math_science_tools"
    content: |
      # Math and Science Tools Path Configuration
      export PATH="$PATH:{{ geogebra_dir }}"
      export PATH="$PATH:{{ scilab_dir }}/bin"
      export PATH="$PATH:{{ paraview_dir }}/bin"
      export PATH="$PATH:{{ stellarium_dir }}"
      export PATH="$PATH:{{ zotero_dir }}"
      
      # FZL Start Aliases
      alias fzl-geogebra-start='nohup {{ geogebra_dir }}/GeoGebra-linux-x64/GeoGebra > /dev/null 2>&1 &'
      alias fzl-scilab-start='nohup {{ scilab_dir }}/bin/scilab > /dev/null 2>&1 &'
      alias fzl-paraview-start='nohup {{ paraview_dir }}/bin/paraview > /dev/null 2>&1 &'
      alias fzl-stellarium-start='nohup {{ stellarium_dir }}/stellarium.AppImage > /dev/null 2>&1 &'
      alias fzl-zotero-start='nohup {{ zotero_dir }}/zotero > /dev/null 2>&1 &'
    mode: '0644'
  become: no

- name: Source Math/Science Tools in .bashrc
  lineinfile:
    path: "~/.bashrc"
    line: "source ~/.bashrc_math_science_tools"
    state: present
  become: no
