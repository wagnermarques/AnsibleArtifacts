---
- name: Get list of installed Docker-related packages
  shell: "rpm -qa | grep -E '^(docker|moby-engine|docker-client|docker-common|docker-latest|docker-selinux|docker-engine)' || true"
  register: installed_docker_packages
  changed_when: false
  when: ansible_distribution == "Fedora"

- name: Remove conflicting Fedora Docker packages
  dnf:
    name: "{{ installed_docker_packages.stdout_lines }}"
    state: absent
  when: 
    - ansible_distribution == "Fedora"
    - installed_docker_packages.stdout_lines | length > 0

- name: Add Docker CE repository for Fedora
  get_url:
    url: https://download.docker.com/linux/fedora/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo
    mode: '0644'
  when: ansible_distribution == "Fedora"

- name: Install Docker
  package:
    name: "{{ (ansible_os_family == 'Debian') | ternary(docker_packages_debian, (ansible_os_family == 'RedHat') | ternary(docker_packages_fedora, docker_packages_alpine)) }}"
    state: present

- name: Start and enable Docker service
  service:
    name: docker
    state: started
    enabled: yes
  when: ansible_os_family != "Alpine"

- name: Start Docker (Alpine/OpenRC)
  shell: rc-service docker start && rc-update add docker boot
  when: ansible_os_family == "Alpine"
  changed_when: false

- name: Add user to docker group
  user:
    name: "{{ ansible_user | default(lookup('env', 'USER')) }}"
    groups: docker
    append: yes
