---
- name: Ensure target directories exist
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ tools_owner }}"
  loop:
    - "{{ intellij_dir }}"
    - "{{ pycharm_dir }}"
    - "{{ webstorm_dir }}"
    - "{{ vscode_dir }}"
    - "{{ dbeaver_dir }}"
    - "{{ datagrip_dir }}"
    - "{{ squirrelsql_dir }}"
  become: yes

- name: Install Tools via Extraction (JetBrains)
  unarchive:
    src: "{{ item.url }}"
    dest: "{{ item.dest }}"
    remote_src: yes
    extra_opts: ["--strip-components=1"]
    creates: "{{ item.dest }}/bin"
    owner: "{{ tools_owner }}"
  loop:
    - { url: "{{ intellij_url }}", dest: "{{ intellij_dir }}" }
    - { url: "{{ pycharm_url }}", dest: "{{ pycharm_dir }}" }
    - { url: "{{ webstorm_url }}", dest: "{{ webstorm_dir }}" }
    - { url: "{{ datagrip_url }}", dest: "{{ datagrip_dir }}" }
  become: yes

- name: Install VS Code
  unarchive:
    src: "{{ vscode_url }}"
    dest: "{{ vscode_dir }}"
    remote_src: yes
    extra_opts: ["--strip-components=1"]
    creates: "{{ vscode_dir }}/bin"
    owner: "{{ tools_owner }}"
  become: yes

- name: Install DBeaver
  unarchive:
    src: "{{ dbeaver_url }}"
    dest: "{{ dbeaver_dir }}"
    remote_src: yes
    extra_opts: ["--strip-components=1"]
    creates: "{{ dbeaver_dir }}/dbeaver"
    owner: "{{ tools_owner }}"
  become: yes

- name: Install SQuirreL SQL
  unarchive:
    src: "{{ squirrelsql_url }}"
    dest: "{{ squirrelsql_dir }}"
    remote_src: yes
    extra_opts: ["--strip-components=1"]
    creates: "{{ squirrelsql_dir }}/squirrel-sql.sh"
    owner: "{{ tools_owner }}"
  become: yes

- name: Create shell integration for Tools PATH
  copy:
    dest: "~/.bashrc_dev_tools"
    content: |
      # Dev Tools Path Configuration
      export PATH="$PATH:{{ intellij_dir }}/bin"
      export PATH="$PATH:{{ pycharm_dir }}/bin"
      export PATH="$PATH:{{ webstorm_dir }}/bin"
      export PATH="$PATH:{{ vscode_dir }}/bin"
      export PATH="$PATH:{{ dbeaver_dir }}"
      export PATH="$PATH:{{ datagrip_dir }}/bin"
      export PATH="$PATH:{{ squirrelsql_dir }}"

      # FZL Start Aliases
      alias fzl-intellij-start='nohup {{ intellij_dir }}/bin/idea.sh > /dev/null 2>&1 &'
      alias fzl-pycharm-start='nohup {{ pycharm_dir }}/bin/pycharm.sh > /dev/null 2>&1 &'
      alias fzl-webstorm-start='nohup {{ webstorm_dir }}/bin/webstorm.sh > /dev/null 2>&1 &'
      alias fzl-vscode-start='nohup {{ vscode_dir }}/bin/code > /dev/null 2>&1 &'
      alias fzl-dbeaver-start='nohup {{ dbeaver_dir }}/dbeaver > /dev/null 2>&1 &'
      alias fzl-datagrip-start='nohup {{ datagrip_dir }}/bin/datagrip.sh > /dev/null 2>&1 &'
      alias fzl-squirrelsql-start='nohup {{ squirrelsql_dir }}/squirrel-sql.sh > /dev/null 2>&1 &'
    mode: '0644'
  become: no

- name: Source Dev Tools in .bashrc
  lineinfile:
    path: "~/.bashrc"
    line: "source ~/.bashrc_dev_tools"
    state: present
  become: no
