---
- name: Install VS Code (Fedora)
  block:
    - name: Add Microsoft GPG key (Fedora)
      rpm_key:
        state: present
        key: https://packages.microsoft.com/keys/microsoft.asc
      become: yes

    - name: Add Visual Studio Code repository (Fedora)
      yum_repository:
        name: vscode
        description: Visual Studio Code
        baseurl: https://packages.microsoft.com/yumrepos/vscode
        enabled: yes
        gpgcheck: yes
        gpgkey: https://packages.microsoft.com/keys/microsoft.asc
      become: yes

    - name: Install VS Code (Fedora)
      dnf:
        name: "{{ vscode_package_name }}"
        state: present
      become: yes
  when: ansible_facts['os_family'] == "RedHat" and install_vscode

- name: Install VS Code (Debian/Ubuntu)
  block:
    - name: Install dependencies for VS Code (Debian)
      apt:
        name:
          - wget
          - gpg
        state: present
      become: yes

    - name: Add Microsoft GPG key (Debian)
      shell: wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > /usr/share/keyrings/packages.microsoft.gpg
      args:
        creates: /usr/share/keyrings/packages.microsoft.gpg
      become: yes

    - name: Add Visual Studio Code repository (Debian)
      apt_repository:
        repo: "deb [arch=amd64,arm64,armhf signed-by=/usr/share/keyrings/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main"
        state: present
        filename: vscode
      become: yes

    - name: Install VS Code (Debian)
      apt:
        name: "{{ vscode_package_name }}"
        state: present
        update_cache: yes
      become: yes
  when: ansible_facts['os_family'] == "Debian" and install_vscode
