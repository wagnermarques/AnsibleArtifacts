---
- name: Ensure Progsativos directory exists
  ansible.builtin.file:
    path: "{{ progsativos_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
  become: yes

- name: Ensure Java parent installation directory exists
  ansible.builtin.file:
    path: "{{ java_install_parent_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"
  become: yes

- name: Download and extract Temurin JDK
  ansible.builtin.unarchive:
    src: "{{ java_download_url }}"
    dest: "{{ java_install_parent_dir }}"
    remote_src: yes
    creates: "{{ java_install_dir }}"
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_id }}"

- name: Set facts for Java binaries
  ansible.builtin.set_fact:
    java_bin: "{{ java_install_dir }}/bin/java"
    javac_bin: "{{ java_install_dir }}/bin/javac"
    jar_bin: "{{ java_install_dir }}/bin/jar"

- name: Register binaries with update-alternatives
  ansible.builtin.command:
    command: "update-alternatives --install /usr/bin/{{ item.name }} {{ item.name }} {{ item.path }} 100"
  loop:
    - { name: 'java', path: "{{ java_bin }}" }
    - { name: 'javac', path: "{{ javac_bin }}" }
    - { name: 'jar', path: "{{ jar_bin }}" }
  become: yes
  changed_when: false

- name: Set default alternatives
  ansible.builtin.command:
    command: "update-alternatives --set {{ item.name }} {{ item.path }}"
  loop:
    - { name: 'java', path: "{{ java_bin }}" }
    - { name: 'javac', path: "{{ javac_bin }}" }
    - { name: 'jar', path: "{{ jar_bin }}" }
  become: yes
  changed_when: false

- name: Configure JAVA_HOME environment variable
  ansible.builtin.template:
    src: java_env.sh.j2
    dest: /etc/profile.d/java.sh
    mode: '0644'
  become: yes
