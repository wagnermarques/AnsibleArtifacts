---
# AI Tools configuration
ai_npm_packages:
  - "@google/gemini-cli"
  - "@anthropic-ai/claude-code"
  - "@gitlawb/openclaude"
  - "@github/copilot"
  - "v0"

# MCP Server Packages for Gemini CLI
mcp_npm_packages:
  - "@modelcontextprotocol/server-github"
  - "@modelcontextprotocol/server-google-maps"
  - "@modelcontextprotocol/server-brave-search"
  - "mcp-server-fetch-typescript"
  - "@modelcontextprotocol/server-sequential-thinking"

# SDKs and libraries (installed via pip)
ai_python_libraries:
  - "anthropic"
  - "google-generativeai"

# CLI Applications (installed via pipx for isolation)
ai_python_apps:
  - "git+https://github.com/paul-gauthier/aider.git"
  - "shell-gpt"
  - "open-interpreter"
  - "aider-install"
