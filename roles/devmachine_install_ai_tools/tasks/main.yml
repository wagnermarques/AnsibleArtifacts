---
- name: Install AI CLI tools via NPM
  npm:
    name: "{{ item }}"
    global: yes
    state: present
  loop:
    - "@google/gemini-cli"
    - "@githubnext/github-copilot-cli"
    - "claude-ai-cli"

- name: Install Anthropic Claude Shell (claude-shell)
  npm:
    name: "claude-shell"
    global: yes
    state: present

- name: Check for Python AI tools
  pip:
    name:
      - "anthropic"
      - "google-generativeai"
    state: present
    executable: pip3
    extra_args: "--break-system-packages"
