app_name: "Catracas Secretaria"
app_env: "prod"
app_debug: "false"

# Database
db_password: "your_secure_db_password_here"

# Admin User
default_admin_password: "your_secure_admin_password_here"

# Firebase Credentials
firebase_auth_email: "your_email@example.com"
