---
- name: List Azure Resources
  hosts: localhost
  connection: local
  become: false
  gather_facts: false
  vars:
    # Default resource type if none is provided
    resource_type: "resourcegroups"
    
  tasks:
    - name: "Informações sobre Assinaturas (Subscriptions)"
      azure.azcollection.azure_rm_subscription_info:
      register: subscription_info
      when: resource_type == "subscriptions"

    - name: "Exibir Assinaturas"
      debug:
        msg: "{{ subscription_info.subscriptions | map(attribute='display_name') | list }}"
      when: resource_type == "subscriptions"

    - name: "Informações sobre Grupos de Recursos (Resource Groups)"
      azure.azcollection.azure_rm_resourcegroup_info:
      register: rg_info
      when: resource_type == "resourcegroups"

    - name: "Exibir Grupos de Recursos"
      debug:
        msg: "{{ rg_info.resource_groups | map(attribute='name') | list }}"
      when: resource_type == "resourcegroups"

    - name: "Informações sobre Máquinas Virtuais (VMs)"
      azure.azcollection.azure_rm_virtualmachine_info:
      register: vm_info
      when: resource_type == "virtualmachines"

    - name: "Buscar detalhes das interfaces de rede"
      azure.azcollection.azure_rm_networkinterface_info:
        resource_group: "{{ item.resource_group }}"
        name: "{{ item.network_interface_names[0] }}"
      register: nic_results
      loop: "{{ vm_info.vms }}"
      when: 
        - resource_type == "virtualmachines"
        - item.network_interface_names | length > 0

    - name: "Buscar detalhes dos IPs Públicos"
      azure.azcollection.azure_rm_publicipaddress_info:
        resource_group: "{{ item.invocation.module_args.resource_group }}"
        name: "{{ item.networkinterfaces[0].ip_configurations[0].public_ip_address | basename }}"
      register: pip_results
      loop: "{{ nic_results.results }}"
      when: 
        - resource_type == "virtualmachines"
        - item.networkinterfaces is defined
        - item.networkinterfaces | length > 0
        - item.networkinterfaces[0].ip_configurations[0].public_ip_address is defined
        - item.networkinterfaces[0].ip_configurations[0].public_ip_address != none

    - name: "Exibir Máquinas Virtuais"
      debug:
        msg: |
          {{"%-20s | %-15s | %-15s" | format('VM Name', 'Admin User', 'Public IP')}}
          {{'-' * 20}} + {{'-' * 15}} + {{'-' * 15}}
          {% for vm in vm_info.vms %}
          {% set nic = nic_results.results | selectattr('item.name', 'equalto', vm.name) | first | default({}) %}
          {% set pip_name = (nic.networkinterfaces[0].ip_configurations[0].public_ip_address | basename) if (nic.networkinterfaces is defined and nic.networkinterfaces[0].ip_configurations[0].public_ip_address is defined) else none %}
          {% set pip = pip_results.results | selectattr('item.item.name', 'equalto', vm.name) | first | default({}) if pip_name else {} %}
          {% set ip = pip.publicipaddresses[0].ip_address if (pip.publicipaddresses is defined and pip.publicipaddresses | length > 0) else 'N/A' %}
          {{"%-20s | %-15s | %-15s" | format(vm.name, vm.admin_username, ip)}}
          {% endfor %}
      when: resource_type == "virtualmachines"

    - name: "Informações sobre Redes Virtuais (VNETs)"
      azure.azcollection.azure_rm_virtualnetwork_info:
      register: vnet_info
      when: resource_type == "vnets"

    - name: "Exibir Redes Virtuais"
      debug:
        msg: "{{ vnet_info.virtualnetworks | map(attribute='name') | list }}"
      when: resource_type == "vnets"


    - name: "Alerta para tipo de recurso desconhecido"
      debug:
        msg: "Tipo de recurso '{{ resource_type }}' não suportado ou não implementado neste exemplo."
      when: resource_type not in ['subscriptions', 'resourcegroups', 'virtualmachines', 'vnets']
